upstream voice_runtime_backend {
    least_conn;
    server 127.0.0.1:17778 max_fails=3 fail_timeout=30s;
    keepalive 16;
}

server {
    listen 80;
    server_name voice-runtime.internal;

    access_log /var/log/nginx/voice-runtime.access.log;
    error_log /var/log/nginx/voice-runtime.error.log warn;

    client_max_body_size 20m;
    proxy_connect_timeout 5s;
    proxy_send_timeout 120s;
    proxy_read_timeout 120s;
    proxy_http_version 1.1;

    # 将 10.0.0.20 替换为 Mortise 应用服务器 IP，必要时可补充同网段其他调用方。
    allow 10.0.0.20;
    allow 127.0.0.1;
    deny all;

    location = /health {
        access_log off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://voice_runtime_backend/health;
    }

    location / {
        proxy_set_header Host $host;
        proxy_set_header X-Request-Id $request_id;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://voice_runtime_backend;
    }
}
