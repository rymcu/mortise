<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh">
<head>
    <meta charset="UTF-8"/>
    <title>验证码</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #f5f5f5;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 600px;
            margin: 40px auto;
            background-color: #ffffff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            overflow: hidden;
        }
        .header {
            background-color: #1a1a2e;
            color: #ffffff;
            padding: 24px 32px;
            text-align: center;
        }
        .header h1 {
            margin: 0;
            font-size: 20px;
            font-weight: 600;
        }
        .body {
            padding: 32px;
        }
        .body p {
            color: #333333;
            font-size: 14px;
            line-height: 1.6;
            margin: 0 0 16px;
        }
        .code-box {
            text-align: center;
            margin: 24px 0;
        }
        .code {
            display: inline-block;
            font-size: 32px;
            font-weight: 700;
            letter-spacing: 8px;
            color: #1a1a2e;
            background-color: #f0f0f5;
            padding: 16px 32px;
            border-radius: 8px;
            border: 1px dashed #cccccc;
        }
        .footer {
            padding: 16px 32px;
            text-align: center;
            font-size: 12px;
            color: #999999;
            border-top: 1px solid #eeeeee;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1 th:text="${siteName}">Mortise</h1>
    </div>
    <div class="body">
        <p>您好，</p>
        <p>您正在进行身份验证操作，验证码如下：</p>
        <div class="code-box">
            <span class="code" th:text="${code}">123456</span>
        </div>
        <p>验证码有效期为 <strong th:text="${expiration}">5</strong> 分钟，请尽快完成验证。</p>
        <p>如果您没有发起此操作，请忽略本邮件。</p>
    </div>
    <div class="footer">
        <p>此邮件由系统自动发送，请勿直接回复。</p>
    </div>
</div>
</body>
</html>
