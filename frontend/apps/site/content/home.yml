seo:
  title: Mortise - 现代化企业级后台管理脚手架
  description: Mortise 基于 Spring Boot 3.5.7 + MyBatis-Flex 构建，集成 JWT、OAuth2 多平台登录、Resilience4j 限流、Prometheus 监控、微信生态等企业级能力，开箱即用。

title: 现代化[企业级]{.text-primary}后台管理脚手架
description: 基于 Spring Boot 3.5.7 + MyBatis-Flex + JDK 21，25 个模块、12 组 SPI 可扩展接口，集成认证授权、监控告警、微信生态等企业级能力，开箱即用。

hero:
  links:
    - label: 进入社区
      icon: i-lucide-users
      trailing: true
      color: primary
      to: /articles
      size: xl
    - label: 快速开始
      icon: i-lucide-book-open
      size: xl
      color: neutral
      variant: outline
      to: /docs/getting-started

features:
  title: 生产就绪，开箱即用
  description: 25 个模块、6 层依赖矩阵、12 组 SPI 可扩展接口，覆盖企业项目核心需求。
  items:
    - title: 多平台 OAuth2 登录
      description: 支持 GitHub、Google、Logto、微信等多平台登录，Strategy 模式可扩展，内置 JWT 无状态认证与自动续期。
      icon: i-lucide-shield-check
    - title: Resilience4j 限流
      description: '@RateLimit 注解驱动，支持 IP / 用户 / 方法 / SpEL 多维限流策略，限流状态自动上报 Actuator 健康端点。'
      icon: i-lucide-gauge
    - title: 微信生态集成
      description: WxJava 多账号公众号管理、消息路由、扫码登录、模板消息推送，支持微信开放平台第三方接入。
      icon: i-simple-icons-wechat
    - title: Prometheus 监控
      description: 集成 Prometheus + Micrometer + Grafana，自定义 HikariCP 连接池、Redis 健康等数据库级指标。
      icon: i-lucide-activity
    - title: 文件统一管理
      description: 基于 x-file-storage 的统一文件 API，支持阿里云 OSS 等多种存储后端，内置分片上传与文件元数据持久化。
      icon: i-lucide-folder-open
    - title: SPI 可扩展架构
      description: 12 组 SPI 接口覆盖缓存、日志、通知、认证等核心模块，热插拔设计让业务扩展无需修改框架代码。
      icon: i-lucide-puzzle

steps:
  title: 三步快速上手
  description: Docker Compose 一键启动依赖，分钟级完成本地开发环境搭建。
  items:
    - title: 克隆并启动依赖
      description: 'git clone https://github.com/rymcu/mortise.git，然后 docker compose up -d 一键启动 PostgreSQL、Redis、Logto、Nginx 等依赖服务。'
      icon: i-lucide-git-branch
    - title: 设置加密密钥
      description: 配置文件使用 Jasypt 加密敏感信息，启动前必须设置 ENCRYPTION_KEY 环境变量，否则数据库连接等配置无法解密。
      icon: i-lucide-key-round
    - title: 启动应用
      description: 'cd mortise-app && mvn spring-boot:run 启动后端（端口 9999），pnpm dev:admin 启动管理端（localhost:3000/admin/）。'
      icon: i-lucide-rocket

cta:
  title: 开始构建你的下一个项目
  description: 加入 Mortise 社区，与其他开发者一起交流分享。
  links:
    - label: 快速开始
      to: /docs/getting-started
      color: primary
      icon: i-lucide-book-open
    - label: GitHub
