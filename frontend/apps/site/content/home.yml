seo:
  title: Mortise - 现代化企业级全栈业务开发平台
  description: Mortise 基于 Spring Boot 3.5.7 + MyBatis-Flex + JDK 21 构建的企业级全栈开发平台，涵盖认证授权、电商交易、聚合支付、社区运营、会员体系等核心业务域，15 组 SPI 可扩展接口，开箱即用。

title: 现代化[企业级]{.text-primary}全栈业务开发平台
description: 基于 Spring Boot 3.5.7 + MyBatis-Flex + JDK 21，25 个模块、15 组 SPI 可扩展接口，涵盖认证授权、电商交易、聚合支付、社区运营等核心业务域，前后端全栈，开箱即用、按需扩展。

hero:
  links:
    - label: 进入社区
      icon: i-lucide-users
      trailing: true
      color: primary
      to: /community
      size: xl
    - label: 快速开始
      icon: i-lucide-book-open
      size: xl
      color: neutral
      variant: outline
      to: /docs/getting-started

features:
  title: 生产就绪，开箱即用
  description: 25 个模块、6 层依赖矩阵、15 组 SPI 可扩展接口，覆盖认证授权、电商支付、社区运营等企业项目核心业务域。
  items:
    - title: 多平台 OAuth2 登录
      description: 支持 GitHub、Google、Logto、微信等多平台登录，Strategy 模式可扩展，内置 JWT 无状态认证与自动续期。
      icon: i-lucide-shield-check
    - title: Resilience4j 限流
      description: '@RateLimit 注解驱动，支持 IP / 用户 / 方法 / SpEL 多维限流策略，限流状态自动上报 Actuator 健康端点。'
      icon: i-lucide-gauge
    - title: 微信生态集成
      description: WxJava 多账号公众号管理、消息路由、扫码登录、模板消息推送，支持微信开放平台第三方接入。
      icon: i-simple-icons-wechat
    - title: Prometheus 监控
      description: 集成 Prometheus + Micrometer + Grafana，自定义 HikariCP 连接池、Redis 健康等数据库级指标。
      icon: i-lucide-activity
    - title: 文件统一管理
      description: 基于 x-file-storage 的统一文件 API，支持阿里云 OSS 等多种存储后端，内置分片上传与文件元数据持久化。
      icon: i-lucide-folder-open
    - title: SPI 可扩展架构
      description: 15 组 SPI 接口覆盖缓存、日志、通知、认证等核心模块，热插拔设计让业务扩展无需修改框架代码。
      icon: i-lucide-puzzle
    - title: 前端 Monorepo 全栈
      description: pnpm Workspace Monorepo 管理三个独立应用（管理端 / 用户端 / 官网），共享 @mortise/auth 、@mortise/core-sdk 、@mortise/base-layer 等内部包，免重复建轮。
      icon: i-lucide-layout-dashboard
    - title: Vue 3 + Nuxt 4 现代前端
      description: 三端均基于 Vue 3 + Nuxt 4 + Nuxt UI 4 + Tailwind CSS v4 构建，管理端 SPA、用户端和官网 SSR，Pinia 状态管理，TipTap 富文本编辑、Unovis 图表可视化。
      icon: i-simple-icons-vuedotjs

steps:
  title: 三步快速上手
  description: Docker Compose 一键启动依赖，分钟级完成本地开发环境搭建。
  items:
    - title: 克隆并启动依赖
      description: 'git clone https://github.com/rymcu/mortise.git，然后 docker compose up -d 一键启动 PostgreSQL、Redis、Logto、Nginx 等依赖服务。'
      icon: i-lucide-git-branch
    - title: 设置加密密钥
      description: 配置文件使用 Jasypt 加密敏感信息，启动前必须设置 ENCRYPTION_KEY 环境变量，否则数据库连接等配置无法解密。
      icon: i-lucide-key-round
    - title: 启动应用
      description: 'cd mortise-app && mvn spring-boot:run 启动后端（端口 9999），pnpm dev:admin 启动管理端（localhost:3000/admin/）。'
      icon: i-lucide-rocket

cta:
  title: 开始构建你的下一个项目
  description: 加入 Mortise 社区，与其他开发者一起交流分享。
  links:
