faq:
  title: 常见问题
  description: 关于 Mortise 定价方案的常见问题解答。
  items:
    - label: 主仓库基础模块真的完全免费吗？
      content: 是的。Mortise 主仓库采用 MIT 开源协议，全部基础模块源码永久免费，可用于个人与商业项目，无任何限制。
    - label: 哪些属于商业扩展模块？
      content: 商业扩展模块目前包括 mortise-community（社区运营）、mortise-payment（聚合支付）、mortise-commerce（电商交易套件）。mortise-wechat 与 mortise-product 均为主仓库免费模块。
    - label: 电商套件如何定价？
      content: mortise-commerce 依赖主仓库免费的 mortise-product（通用资源目录）和商业模块 mortise-payment。可单独购买两者，也可套件组合购买 commerce + payment 享报价优惠。如需报价请联系我们。
    - label: 购买商业模块是否包含技术支持？
      content: 购买商业模块时提供基础集成文档与示例。如需专属技术支持、一对一咨询或优先 Bug 修复，请选择企业技术服务方案。
    - label: 如何获取发票？
      content: 购买商业模块或企业服务后，我们提供增值税专用/普通发票，请在下单时说明开票需求。
    - label: 退款政策是什么？
      content: 商业模块交付后如存在严重质量问题，支持 7 天内协商退款。企业服务合同以合同条款为准。
