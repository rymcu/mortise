title: 关于 Mortise
description: Mortise 是一款现代化、模块化的企业级 Java 脚手架，基于 Spring Boot 3 构建。主仓库基础模块 MIT 协议永久免费开源，商业扩展模块单独定价授权。
mission: 打造开箱即用的企业级 Java 脚手架，让开发者专注业务逻辑，告别重复的基础设施建设。

highlights:
  - icon: i-lucide-lock-open
    title: 基础模块永久免费
    description: 主仓库全部基础模块采用 MIT 协议开源，可用于个人与商业项目，无任何限制。
  - icon: i-lucide-blocks
    title: 商业模块按需选购
    description: 电商、支付、社区、微信等高级业务模块单独定价、源码交付、永久授权，按需组合。
  - icon: i-lucide-layers
    title: 模块化分层架构
    description: 6 层依赖矩阵、12 组 SPI 可扩展接口，模块间低耦合，按需引入，易于维护。
  - icon: i-lucide-shield-check
    title: 生产就绪
    description: 集成 Spring Security、Flyway 数据库迁移、Resilience4j 限流、Prometheus 监控。

license:
  type: MIT
  url: https://github.com/rymcu/mortise/blob/master/LICENSE
github: https://github.com/rymcu/mortise

